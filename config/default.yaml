# Skyloom default configuration
llm:
  default_model: gpt-4o
  language: zh
  max_retries: 2
  temperature: 0.7
  max_tokens: 4096

# Per-agent models inherit `llm.default_model` (or the user's wizard-chosen
# top-level default_model) unless an agent sets its own `model:` here.
agents:
  fog:
    temperature: 0.7
  rain:
    temperature: 0.7
  frost:
    temperature: 0.3
  snow:
    temperature: 0.5
  dew:
    temperature: 0.3
  fair:
    temperature: 0.9

memory:
  db_path: ~/.skyloom/memory.db
  short_term_limit: 100
  max_persisted_messages: 2000

workspace:
  path: auto

cli:
  default_agent: fog
  approval_mode: interactive

plugins:
  enabled: true
  directories:
    - ~/.skyloom/plugins

mcp:
  servers: []
